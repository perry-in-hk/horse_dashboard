# Local development only — exposes backend :4000 and Keycloak :8080 on the host.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
# Do NOT use this file on Linode/production (only Caddy :80/:443 should be public).

services:
  backend:
    ports:
      - "4000:4000"

  keycloak:
    ports:
      - "8080:8080"
    environment:
      KC_HOSTNAME_PORT: 80
      KC_HOSTNAME_STRICT_HTTPS: "false"
